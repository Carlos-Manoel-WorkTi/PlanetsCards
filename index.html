<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="./dist/script/start.js" defer></script>
    <link rel="stylesheet" href="./src/style/index.css">
    <link rel="stylesheet" href="./src/style/animation/animation.css">
    <link rel="stylesheet" href="./src/style/perfil.css">
    <link rel="stylesheet" href="./src/style/config.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Irish+Grover&display=swap" rel="stylesheet">

    <title>PlanetsCard</title>
</head>

<body id="root">
    <header id="header">

        
        <nav id="nav">
            <!-- <span id="login-in">Entrar</span>
            <span id="login-up">Cadastrar</span> -->
            <img id="config_svg" src="public/config.svg" alt="">
        </nav>
    </header>
    <main>

        <section id="container-difficult">
            <div id="difficult" class="difficult-section">
                <h3>Dificuldade: <span id="show_difficult" style="color:#4270be">Normal</span></h3>
                <ul>
                    <li id="easy"><button class="easy-btn choose-difficult">Fácil</button></li>
                    <li id="normal"><button class="normal-btn choose-difficult">Normal</button></li>
                    <li id="hard"><button class="hard-btn choose-difficult">Difícil</button></li>
                </ul>
            </div>

        </section>
        <section id="section">
            <h1 id="title">PlanetsCard</h1>
            <a id="link_start" href="./game.html">Start</a>
        </section>
        <div id="containerVideo">
            <div class="overlay"></div>
            <video id="backgroundVideo" autoplay muted loop>
                <source src="./public/vdbg.mp4" type="video/mp4">
                Seu navegador não suporta o elemento de vídeo.
            </video>
        </div>
    </main>
</body>

</html>
